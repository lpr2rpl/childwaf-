# ══════════════════════════════════════════════════════════════════════════════
# childwaf  –  Main Configuration
# ══════════════════════════════════════════════════════════════════════════════
# After editing, apply changes with:  childwaf reload

# ── General ───────────────────────────────────────────────────────────────────

# Configuration directory (all other paths are relative to this unless absolute)
CONF_DIR=/etc/childwaf

# Log file path and verbosity (debug | info | warn | error)
LOG_FILE=/var/log/childwaf.log
LOG_LEVEL=info

# ── Network interfaces ────────────────────────────────────────────────────────

# LAN interface – where children's devices connect
# Common values: eth0, br0, enp3s0, lan0
LAN_INTERFACE=eth0

# WAN interface – internet-facing (used for DoH/DoT blocking)
# Common values: eth1, ppp0, wan0
WAN_INTERFACE=eth1

# ── Modules ───────────────────────────────────────────────────────────────────
# Set to "no" to disable a module globally (can be overridden per child).

# DNS module: generates dnsmasq config for domain→ipset mapping and hard blocks
MODULE_DNS=yes

# iptables module: creates ipsets, per-child chains, schedule rules
MODULE_IPTABLES=yes

# Schedule module: controls time-based access windows (requires MODULE_IPTABLES)
MODULE_SCHEDULE=yes

# ── DNS settings ──────────────────────────────────────────────────────────────

# Port that the local (filtering) dnsmasq listens on.
# Set to 53 if this machine is already the children's DNS server (most common).
# Set to 5353 if you run a second dedicated filtering dnsmasq instance.
DNS_LOCAL_PORT=53

# Redirect children's DNS queries to the local DNS port (recommended: yes).
# This forces children to use our filtering resolver even if they manually
# configure an external DNS on their device.
DNS_REDIRECT_CHILDREN=yes

# Block DNS bypass techniques for children:
#   - Blocks forwarded port 53 UDP/TCP (external DNS)
#   - Blocks port 853 TCP (DNS-over-TLS)
# Note: blocking DNS-over-HTTPS (port 443 to DoH providers) requires
# additional rules; add the known DoH provider IPs to a custom blocklist.
DNS_BLOCK_BYPASS=yes

# dnsmasq config drop-in directory
DNSMASQ_CONF_D=/etc/dnsmasq.d

# ── Upstream DNS ──────────────────────────────────────────────────────────────
# These are used as hints for your dnsmasq upstream configuration.
# childwaf itself does not configure dnsmasq's upstream – set that in
# /etc/dnsmasq.conf or /etc/dnsmasq.d/upstream.conf.
#
# Recommended: use a family-safe upstream such as:
#   Cloudflare for Families:  1.1.1.3 / 1.0.0.3
#   CleanBrowsing Family:     185.228.168.168 / 185.228.169.168
#   OpenDNS FamilyShield:     208.67.222.123 / 208.67.220.123
