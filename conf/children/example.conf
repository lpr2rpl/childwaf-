# ══════════════════════════════════════════════════════════════════════════════
# childwaf  –  Child Profile  (example / template)
# ══════════════════════════════════════════════════════════════════════════════
#
# HOW TO USE
# ──────────
# 1. Copy this file:  cp example.conf alice.conf
# 2. Edit the new file – at minimum set NAME and IP.
# 3. Apply:           childwaf reload
#
# The filename (without .conf) becomes the child's identifier and is used in
# ipset names and iptables chains, so keep it short and alphanumeric.

# ── Identity ──────────────────────────────────────────────────────────────────

# Human-readable name (used in logs and status output)
NAME="Example Child"

# IP address(es) of the child's device(s).
# Separate multiple addresses with spaces; CIDR notation is also supported.
#
# Examples:
#   Single device:         IP=192.168.1.100
#   Multiple devices:      IP="192.168.1.100 192.168.1.101"
#   Whole subnet:          IP=192.168.1.0/24
#
# Tip: configure a DHCP static lease in your router so the child's device
# always gets the same IP address.
IP=192.168.1.100

# Optional MAC address (informational only – used in log messages)
# MAC=aa:bb:cc:dd:ee:ff

# ── Module overrides ──────────────────────────────────────────────────────────
# These default to the global MODULE_* settings in childwaf.conf.
# Set to "no" to disable a module for this child only.

DNS_FILTER=yes        # Apply DNS-based domain/category filtering
SCHEDULE_ENABLED=yes  # Apply time-based access schedule

# ── Content filtering ─────────────────────────────────────────────────────────

# Space-separated list of blocklist categories to apply.
# Each category corresponds to a file in /etc/childwaf/blocklists/<category>.list
#
# Built-in categories:
#   adult           Adult / explicit content
#   social-media    Social media platforms
#   gaming          Online gaming platforms
#   streaming       Video and music streaming services
#   custom          Your own custom domain list
#
# Example: BLOCK_CATEGORIES="adult social-media"
BLOCK_CATEGORIES="adult social-media gaming"

# Additional individual domains to hard-block (NXDOMAIN) for this child.
# These are applied on top of BLOCK_CATEGORIES.
# Example: BLOCK_DOMAINS="example-game.com chat-app.io"
BLOCK_DOMAINS=""

# Domains to explicitly allow even if they appear in a blocklist.
# (Future feature – not yet implemented in iptables rules)
# ALLOW_DOMAINS="educational-site.com"

# ── Schedule ──────────────────────────────────────────────────────────────────
# Define when internet access is ALLOWED for each day of the week.
#
# Format: HH:MM-HH:MM  (24-hour clock)
#         "always"      (allow the entire day)
#         "never"       (block the entire day)
#
# Time ranges must be within a single day (no midnight-spanning ranges
# unless your iptables version supports it – in that case HH:MM > HH:MM works).
#
# Example schedule: allowed after school on weekdays, relaxed on weekends.
SCHEDULE_MON=15:00-20:00
SCHEDULE_TUE=15:00-20:00
SCHEDULE_WED=15:00-20:00
SCHEDULE_THU=15:00-20:00
SCHEDULE_FRI=15:00-22:00
SCHEDULE_SAT=10:00-22:00
SCHEDULE_SUN=10:00-20:00

# ── Advanced ──────────────────────────────────────────────────────────────────

# Block HTTPS connections to domains in blocked categories.
# When set to "yes", iptables also blocks port 443 to category IPs.
# Note: this may break some legitimate sites that share IP ranges.
BLOCK_HTTPS_BYPASS=no
